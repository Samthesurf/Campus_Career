<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1e1e1e" />
  
  <!-- Base part of the cap (much darker for contrast) -->
  <path d="M 18,39 L 18,74 Q 50,96 82,74 L 82,39 Z" fill="#B37D00" />
  
  <!-- Top diamond (bright yellow) with a dark stroke matching the background -->
  <!-- This stroke acts as "negative space", visually separating the top from the base entirely -->
  <polygon points="50,12 96,35 50,58 4,35" fill="#FFC107" stroke="#1e1e1e" stroke-width="5" stroke-linejoin="round"/>
  
  <!-- Tassel string (lightest color to pop against everything) -->
  <path d="M 50,35 Q 88,40 88,60" fill="none" stroke="#FFF59D" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Tassel bulb/fringe -->
  <circle cx="88" cy="68" r="7" fill="#FFF59D"/>
  <path d="M 84.5,68 L 84.5,78 M 88,68 L 88,80 M 91.5,68 L 91.5,78" fill="none" stroke="#FFF59D" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Top button -->
  <ellipse cx="50" cy="35" rx="6" ry="3.5" fill="#D49A00"/>
</svg>
