<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300">
  <defs>
    <filter id="hatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.3" />
    </filter>

    <linearGradient id="capBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0E" />
      <stop offset="30%" stop-color="#1E1E2A" />
      <stop offset="70%" stop-color="#111118" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>

    <linearGradient id="goldBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E69900" />
      <stop offset="15%" stop-color="#FFDF00" />
      <stop offset="30%" stop-color="#FFF5B8" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="75%" stop-color="#FFDF00" />
      <stop offset="90%" stop-color="#FFF5B8" />
      <stop offset="100%" stop-color="#B37700" />
    </linearGradient>

    <linearGradient id="boardTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3A4A" />
      <stop offset="40%" stop-color="#1A1A24" />
      <stop offset="100%" stop-color="#0A0A10" />
    </linearGradient>

    <linearGradient id="boardLeftEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#232330" />
      <stop offset="100%" stop-color="#0A0A0E" />
    </linearGradient>

    <linearGradient id="boardRightEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#55556B" />
      <stop offset="30%" stop-color="#2D2D3A" />
      <stop offset="100%" stop-color="#15151E" />
    </linearGradient>

    <linearGradient id="tasselFringe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A67C00" />
      <stop offset="30%" stop-color="#FFDF00" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#805E00" />
    </linearGradient>
  </defs>

  <g filter="url(#hatShadow)">
    <path d="M 90 140 L 90 200 C 90 240, 210 230, 210 180 L 210 120 Z" fill="url(#capBase)" />
    
    <path d="M 90 180 C 100 215, 200 205, 210 160 L 210 180 C 200 225, 100 235, 90 200 Z" fill="url(#goldBand)" />
    <path d="M 90 180 C 100 215, 200 205, 210 160" fill="none" stroke="#FFFFCC" stroke-width="2" opacity="0.7" />
    <path d="M 90 200 C 100 235, 200 225, 210 180" fill="none" stroke="#664D00" stroke-width="3" opacity="0.6" />

    <polygon points="30,120 120,160 120,172 30,132" fill="url(#boardLeftEdge)" />
    <polygon points="120,160 270,110 270,122 120,172" fill="url(#boardRightEdge)" />

    <polygon points="30,120 120,160 270,110 180,70" fill="url(#boardTop)" stroke="#4A4A60" stroke-width="1.5" stroke-linejoin="round" />

    <path d="M 150 119 Q 210 139 268 118" fill="none" stroke="#000" stroke-width="4" opacity="0.4" stroke-linecap="round" />
    <path d="M 150 115 Q 210 135 268 114" fill="none" stroke="url(#goldBand)" stroke-width="4" stroke-linecap="round" />

    <ellipse cx="150" cy="118" rx="11" ry="6" fill="#000" opacity="0.5" />
    <ellipse cx="150" cy="115" rx="10" ry="5" fill="#1C1C26" stroke="#4A4A60" stroke-width="1.5" />

    <path d="M 268 114 Q 275 125 272 160" fill="none" stroke="#000" stroke-width="4" opacity="0.4" transform="translate(-2, 2)" stroke-linecap="round" />
    <path d="M 268 114 Q 275 125 272 160" fill="none" stroke="url(#goldBand)" stroke-width="4" stroke-linecap="round" />

    <path d="M 267 164 L 255 215 A 16 5 0 0 1 285 215 L 277 164 Z" fill="#000" opacity="0.4" transform="translate(3, 4)" />
    <path d="M 267 164 L 255 215 A 16 5 0 0 1 285 215 L 277 164 Z" fill="url(#tasselFringe)" />
    
    <path d="M 269 164 L 259 214 M 272 164 L 270 216 M 275 164 L 280 214" stroke="#805E00" stroke-width="1.5" fill="none" opacity="0.7" />

    <rect x="264" y="156" width="14" height="10" rx="3" fill="url(#goldBand)" />
    <line x1="264" y1="161" x2="278" y2="161" stroke="#997300" stroke-width="1.5" />
  </g>
</svg>
